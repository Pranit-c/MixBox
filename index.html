<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MixBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- htm: must use /dist/htm.umd.js — the package root is ESM-only and won't define window.htm -->
  <script src="https://cdn.jsdelivr.net/npm/htm@3/dist/htm.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fabric@5.3.1/dist/fabric.min.js"></script>
  <!-- MediaPipe loaded lazily inside startGestureMode — NOT blocking page load -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #ede8df;
      --surface2: #e4ddd3;
      --border: #d4c9b5;
      --earth: #7c5cbf;
      --earth-dim: #5a3f9a;
      --earth-light: #a08dd4;
      --sage: #6b7c5a;
      --clay: #b07d5a;
      --text: #3d3530;
      --text-dim: #7a6a5a;
      --text-muted: #a89880;
      --voice: #6b4f3a;
      --tr: 0.2s ease;
    }

    html, body { height: 100%; font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); overflow: hidden; }

    /* Layout */
    .app-grid {
      display: grid;
      grid-template-columns: 250px 1fr 200px;
      grid-template-rows: 48px 1fr 80px;
      grid-template-areas: "hd hd hd" "sb cv op" "ft ft ft";
      height: 100vh;
    }

    /* Header */
    .hd { grid-area: hd; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--surface); z-index: 10; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 300; letter-spacing: 0.12em; }
    .logo-accent { color: var(--earth); }
    .status-bar { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.08em; display: flex; align-items: center; gap: 7px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: all var(--tr); }
    .status-dot.live { background: var(--sage); box-shadow: 0 0 8px rgba(107,124,90,0.5); }
    .status-dot.speaking { background: var(--clay); box-shadow: 0 0 8px rgba(176,125,90,0.6); animation: blink 0.6s ease-in-out infinite alternate; }
    @keyframes blink { from { opacity: 0.5 } to { opacity: 1 } }

    /* Sidebar */
    .sb { grid-area: sb; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow: hidden; }
    .section-hd {
      padding: 10px 14px 6px;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      text-transform: uppercase;
      flex-shrink: 0;
      transition: color var(--tr);
    }
    .section-hd.active { color: var(--earth); }
    .section-div { height: 1px; background: var(--border); margin: 2px 0; flex-shrink: 0; }

    /* Colors */
    .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; padding: 4px 14px 10px; flex-shrink: 0; }
    .color-swatch {
      aspect-ratio: 1; border-radius: 50%; cursor: pointer;
      border: 2.5px solid transparent;
      box-shadow: 0 1px 4px rgba(61,53,48,0.18);
      transition: transform var(--tr), border-color var(--tr), box-shadow var(--tr), opacity var(--tr);
    }
    .color-swatch:hover { transform: scale(1.15); box-shadow: 0 3px 10px rgba(61,53,48,0.25); }
    .color-swatch.sel { border-color: var(--earth); transform: scale(1.1); box-shadow: 0 0 14px rgba(124,92,191,0.45); }
    .color-swatch.white-ring { border-color: var(--border); }
    .color-swatch.dimmed { opacity: 0.35; pointer-events: none; }
    .color-swatch.locked { opacity: 0.5; pointer-events: none; }

    /* Gesture guidance in sidebar */
    .gesture-guide {
      padding: 8px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .pose-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.58rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      padding: 3px 0;
    }
    .pose-pill .icon { font-size: 0.9rem; width: 18px; text-align: center; }
    .stamp-tally {
      margin-top: 4px;
      font-size: 0.55rem;
      color: var(--earth);
      letter-spacing: 0.12em;
      font-style: italic;
    }

    /* Palette */
    .palette-scroll { flex: 1; overflow-y: auto; padding: 4px 10px 10px; }
    .palette-scroll::-webkit-scrollbar { width: 3px; }
    .palette-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .palette-empty { padding: 16px 4px; text-align: center; color: var(--text-muted); font-size: 0.75rem; line-height: 1.9; font-family: 'Cormorant Garamond', serif; font-style: italic; }
    .palette-item {
      border-radius: 8px; border: 1px solid var(--border); overflow: hidden;
      cursor: pointer; position: relative; background: var(--surface2);
      margin-bottom: 7px;
      opacity: 0; transform: scale(0.92) translateY(8px);
      animation: img-arrive 0.5s ease forwards;
      transition: border-color var(--tr), box-shadow var(--tr);
    }
    .palette-item:hover { border-color: var(--earth); box-shadow: 0 4px 16px rgba(124,92,191,0.15); }
    .palette-item img { width: 100%; height: auto; display: block; }
    .palette-item .hint-overlay {
      position: absolute; inset: 0;
      background: rgba(124,92,191,0.3); display: flex;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity var(--tr);
      font-size: 0.58rem; color: white; letter-spacing: 0.08em;
    }
    .palette-item:hover .hint-overlay { opacity: 1; }
    @keyframes img-arrive {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Generating skeleton */
    .gen-skeleton {
      height: 70px; border-radius: 8px; margin-bottom: 7px;
      background: linear-gradient(90deg, var(--surface2) 0%, var(--border) 50%, var(--surface2) 100%);
      background-size: 200% 100%; animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }

    /* Canvas area */
    .cv { grid-area: cv; position: relative; background: var(--bg); overflow: hidden; }
    .cv canvas { display: block; }
    .cv-toolbar {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 4px 10px; z-index: 5;
      opacity: 0; transition: opacity var(--tr); box-shadow: 0 2px 10px rgba(61,53,48,0.08);
    }
    .cv:hover .cv-toolbar { opacity: 1; }
    .cv-btn {
      background: none; border: none; color: var(--text-muted);
      font-size: 0.6rem; letter-spacing: 0.07em; padding: 3px 8px;
      border-radius: 12px; cursor: pointer; transition: all var(--tr);
      font-family: 'DM Mono', monospace;
    }
    .cv-btn:hover { background: var(--surface2); color: var(--text); }
    .gen-badge {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--earth-light);
      border-radius: 18px; padding: 6px 16px; font-size: 0.6rem;
      color: var(--earth); letter-spacing: 0.08em; z-index: 10;
      box-shadow: 0 2px 12px rgba(124,92,191,0.15);
      animation: img-arrive 0.3s ease forwards;
    }

    /* Webcam PiP — visible during collage mode */
    .webcam-pip {
      position: absolute; top: 14px; right: 14px;
      width: 108px; height: 80px; border-radius: 10px;
      overflow: hidden; border: 1.5px solid var(--border);
      background: var(--surface2); z-index: 8;
      opacity: 0; transition: opacity 0.6s ease;
      box-shadow: 0 2px 12px rgba(61,53,48,0.12);
    }
    .webcam-pip.visible { opacity: 1; }
    .webcam-pip video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .webcam-label {
      position: absolute; bottom: 5px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.46rem; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.7); white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    /* ── Gesture Zone ────────────────────────────────────────────────────── */
    .gesture-zone {
      position: absolute;
      inset: 0;
      background: #f9f5ef;
      overflow: hidden;
    }

    /* The stamp canvas — fills the zone, marks accumulate here */
    .stamp-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Hand PiP — webcam + skeleton, top-right corner */
    .hand-pip-wrap {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 224px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(160,130,220,0.35);
      background: rgba(22, 16, 36, 0.82);
      box-shadow: 0 4px 22px rgba(0,0,0,0.28);
      z-index: 8;
    }
    .hand-pip-canvas { display: block; width: 224px; height: 168px; }
    .pose-label {
      padding: 5px 10px 7px;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: rgba(200,178,255,0.88);
      text-align: center;
      font-family: 'DM Mono', monospace;
      background: rgba(14,10,22,0.55);
      min-height: 26px;
    }

    /* Gesture footer — done button + stamp count */
    .gesture-footer {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(245,240,232,0.92);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 8px 22px;
      backdrop-filter: blur(6px);
      box-shadow: 0 2px 14px rgba(61,53,48,0.1);
      z-index: 9;
    }
    .mark-count {
      font-size: 0.6rem;
      color: var(--earth);
      letter-spacing: 0.1em;
      min-width: 64px;
      font-style: italic;
    }
    .done-btn {
      padding: 7px 22px;
      background: var(--earth);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all var(--tr);
    }
    .done-btn:hover:not(:disabled) { background: var(--earth-light); box-shadow: 0 0 14px rgba(124,92,191,0.3); }
    .done-btn:disabled { opacity: 0.3; cursor: default; }

    /* Hands-loading notice */
    .hands-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(249,245,239,0.92);
      z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      animation: fadein 0.4s ease;
    }
    .hands-spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--earth);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Orb panel */
    .op { grid-area: op; border-left: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; align-items: center; padding: 22px 14px 14px; gap: 16px; }
    .orb-wrap { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .orb {
      width: 64px; height: 64px; border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #e8d5b0, #b07d5a 45%, #7c5cbf 70%, #4a2a7a);
      box-shadow: 0 0 20px rgba(176,125,90,0.22);
      transition: transform var(--tr), box-shadow var(--tr);
      position: relative; z-index: 2;
    }
    .orb-wrap::before, .orb-wrap::after {
      content: ''; position: absolute; border-radius: 50%;
      border: 1px solid var(--clay); opacity: 0; pointer-events: none;
    }
    .orb-wrap.listening::before { width: 80px; height: 80px; animation: ripple 2.5s ease-out infinite; }
    .orb-wrap.listening::after  { width: 80px; height: 80px; animation: ripple 2.5s ease-out infinite 0.8s; }
    @keyframes ripple { 0% { transform: scale(0.85); opacity: 0.5 } 100% { transform: scale(1.5); opacity: 0 } }
    .orb-wrap.listening .orb { transform: scale(1.05); box-shadow: 0 0 36px rgba(176,125,90,0.3); }
    .orb-wrap.speaking .orb  { animation: orbspeak 0.6s ease-in-out infinite alternate; box-shadow: 0 0 44px rgba(124,92,191,0.4); }
    @keyframes orbspeak { from { transform: scale(1.02) } to { transform: scale(1.1) } }

    .transcript {
      width: 100%; flex: 1; min-height: 0; overflow-y: auto;
      font-family: 'Cormorant Garamond', serif; font-size: 0.85rem;
      font-style: italic; color: var(--voice); line-height: 1.9; text-align: center;
    }
    .transcript::-webkit-scrollbar { width: 2px; }
    .transcript::-webkit-scrollbar-thumb { background: var(--border); }

    /* Footer */
    .ft { grid-area: ft; border-top: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .ft-group { display: flex; align-items: center; gap: 8px; }
    .btn {
      padding: 8px 20px; border-radius: 8px; font-family: 'DM Mono', monospace;
      font-size: 0.7rem; letter-spacing: 0.08em; cursor: pointer;
      transition: all var(--tr); border: 1px solid transparent;
    }
    .btn-start { background: var(--earth); color: white; border-color: var(--earth); }
    .btn-start:hover:not(:disabled) { background: var(--earth-light); box-shadow: 0 0 16px rgba(124,92,191,0.25); }
    .btn-start:disabled { opacity: 0.4; cursor: default; }
    .btn-stop { background: transparent; color: var(--text-muted); border-color: var(--border); }
    .btn-stop:hover:not(:disabled) { border-color: var(--clay); color: var(--clay); }
    .btn-stop:disabled { opacity: 0.3; cursor: default; }
    .ft-status { font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.06em; }

    /* Close overlay */
    .close-ov {
      position: fixed; inset: 0; background: rgba(245,240,232,0.94);
      z-index: 100; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px;
      backdrop-filter: blur(8px); animation: fadein 0.4s ease;
    }
    .close-orb {
      width: 72px; height: 72px; border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #e8d5b0, #b07d5a 45%, #7c5cbf 70%, #4a2a7a);
      box-shadow: 0 0 50px rgba(176,125,90,0.3);
      animation: orbspeak 0.8s ease-in-out infinite alternate;
    }
    .close-msg {
      max-width: 400px; text-align: center;
      font-family: 'Cormorant Garamond', serif; font-size: 1.2rem;
      font-weight: 300; line-height: 1.9; color: var(--voice); font-style: italic;
    }
    .close-btns { display: flex; gap: 10px; }
    .close-primary { padding: 10px 24px; background: var(--earth); color: white; border: none; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; cursor: pointer; }
    .close-secondary { padding: 10px 24px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; cursor: pointer; }
    @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }

    /* Paper texture overlay */
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; opacity: 0.6; mix-blend-mode: multiply; z-index: 1000;
    }
  </style>
</head>

<body>
<!-- Visible fallback: shown until React mounts; also catches hard errors -->
<div id="pre-render" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f5f0e8;font-family:'DM Mono',monospace;font-size:0.75rem;color:#7a6a5a;letter-spacing:0.06em;z-index:9999;">
  loading MixBox…
</div>
<div id="root"></div>
<audio id="ambient" src="/static/ambient.mp3" loop preload="auto"></audio>

<script>
// Show any unhandled JS errors visibly instead of a blank screen
window.onerror = function(msg, src, line, col, err) {
  var d = document.getElementById('pre-render');
  if (d) {
    d.style.flexDirection = 'column';
    d.style.gap = '12px';
    d.innerHTML =
      '<div style="font-size:1rem;color:#c24a3c;">MixBox failed to load</div>' +
      '<div style="max-width:500px;text-align:center;color:#7a6a5a;line-height:1.7;">' + msg + '</div>' +
      '<div style="color:#a89880;font-size:0.65rem;">' + src + ':' + line + '</div>' +
      '<div style="margin-top:8px;color:#7a6a5a;">Try a hard refresh (Cmd+Shift+R / Ctrl+Shift+R)</div>';
  }
  return false;
};
</script>

<script>
// ── React setup ─────────────────────────────────────────────────────────────
const { useState, useRef, useEffect, useCallback } = React;
const html = htm.bind(React.createElement);

// ── Data ────────────────────────────────────────────────────────────────────
const COLORS = [
  { name: 'blue',   hex: '#4a7fa5' }, { name: 'teal',   hex: '#3d8c8c' },
  { name: 'green',  hex: '#4a7c59' }, { name: 'yellow', hex: '#dbb84a' },
  { name: 'orange', hex: '#d4783c' }, { name: 'red',    hex: '#c24a3c' },
  { name: 'pink',   hex: '#cc7a90' }, { name: 'purple', hex: '#7c5cbf' },
  { name: 'brown',  hex: '#7c5a3c' }, { name: 'black',  hex: '#2a2520' },
  { name: 'white',  hex: '#f5f0e8' }, { name: 'gold',   hex: '#c9a840' },
];

const POSE_LABELS = {
  open:  '✋ open palm  →  burst',
  fist:  '✊ fist  →  circle',
  point: '☝️ point  →  spike',
  peace: '✌️ peace  →  branch',
  pinch: '🤌 pinch  →  gem',
};

const CLOSE_MSGS = [
  "You showed up today and made something. That matters.",
  "What you made here belongs to you. Every choice was yours.",
  "Something happened here today. I witnessed it. Thank you.",
  "You brought yourself to this canvas. You carry this with you.",
];

// ── Audio helpers ────────────────────────────────────────────────────────────
let _audioCtx = null;
let _playbackQueue = [];
let _isPlaying = false;
let _orbStateSetter = null;

function float32ToInt16(f32) {
  const out = new Int16Array(f32.length);
  for (let i = 0; i < f32.length; i++) {
    const s = Math.max(-1, Math.min(1, f32[i]));
    out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }
  return out;
}
function enqueueAudio(buffer) {
  _playbackQueue.push(buffer);
  if (!_isPlaying) drainQueue();
}
function drainQueue() {
  if (!_playbackQueue.length || !_audioCtx) { _isPlaying = false; if (_orbStateSetter) _orbStateSetter('listening'); return; }
  _isPlaying = true;
  if (_orbStateSetter) _orbStateSetter('speaking');
  const int16 = new Int16Array(_playbackQueue.shift());
  const f32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / (int16[i] < 0 ? 0x8000 : 0x7fff);
  const buf = _audioCtx.createBuffer(1, f32.length, 24000);
  buf.copyToChannel(f32, 0);
  const src = _audioCtx.createBufferSource();
  src.buffer = buf; src.connect(_audioCtx.destination);
  src.onended = drainQueue; src.start();
}

// ── Gesture: pose classification ─────────────────────────────────────────────
function classifyPose(lm) {
  if (!lm || lm.length < 21) return null;
  // Finger extended: tip.y strictly above pip.y (y=0 is top of image)
  const ext = {
    index:  lm[8].y  < lm[6].y,
    middle: lm[12].y < lm[10].y,
    ring:   lm[16].y < lm[14].y,
    pinky:  lm[20].y < lm[18].y,
  };
  // Pinch: thumb tip close to index tip
  const pd = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
  const isPinch = pd < 0.08;
  const cnt = Object.values(ext).filter(Boolean).length;

  if (isPinch && cnt <= 1) return 'pinch';
  if (cnt >= 4)            return 'open';
  if (cnt === 0)           return 'fist';
  if (cnt === 1 && ext.index)  return 'point';
  if (cnt === 2 && ext.index && ext.middle) return 'peace';
  return null;
}

function palmCenter(lm) {
  // Average of wrist + 4 metacarpals
  const pts = [lm[0], lm[5], lm[9], lm[13], lm[17]];
  return {
    x: pts.reduce((s, p) => s + p.x, 0) / pts.length,
    y: pts.reduce((s, p) => s + p.y, 0) / pts.length,
  };
}

// ── Gesture: stamp drawing functions ─────────────────────────────────────────
function drawStamp(ctx, pose, x, y, color) {
  const size = 38 + Math.random() * 20;   // 38–58px, slight randomness
  const alpha = 0.68 + Math.random() * 0.20;
  ctx.save();
  ctx.globalAlpha = alpha;

  switch (pose) {
    case 'open': {                          // Starburst — open energy radiating out
      const rays = 10;
      const r1 = size, r2 = size * 0.36;
      ctx.beginPath();
      for (let i = 0; i < rays * 2; i++) {
        const a = (i * Math.PI) / rays - Math.PI / 2;
        const r = i % 2 === 0 ? r1 : r2;
        const px = x + r * Math.cos(a), py = y + r * Math.sin(a);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      break;
    }
    case 'fist': {                          // Dense filled circle — held, contained
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, size * 0.62, 0, Math.PI * 2);
      ctx.fill();
      // Inner ring texture
      ctx.globalAlpha *= 0.38;
      ctx.beginPath();
      ctx.arc(x, y, size * 0.28, 0, Math.PI * 2);
      ctx.fillStyle = '#f9f5ef';
      ctx.fill();
      break;
    }
    case 'point': {                         // Upward spike — directed, focused
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x, y - size);
      ctx.lineTo(x + size * 0.30, y + size * 0.42);
      ctx.lineTo(x, y + size * 0.14);
      ctx.lineTo(x - size * 0.30, y + size * 0.42);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case 'peace': {                         // Fork/branch — two paths diverging
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(4, size * 0.15);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      // Stem
      ctx.beginPath();
      ctx.moveTo(x, y + size * 0.62);
      ctx.lineTo(x, y - size * 0.08);
      ctx.stroke();
      // Left arm
      ctx.beginPath();
      ctx.moveTo(x, y - size * 0.08);
      ctx.lineTo(x - size * 0.52, y - size * 0.78);
      ctx.stroke();
      // Right arm
      ctx.beginPath();
      ctx.moveTo(x, y - size * 0.08);
      ctx.lineTo(x + size * 0.52, y - size * 0.78);
      ctx.stroke();
      break;
    }
    case 'pinch': {                         // Diamond gem — delicate, intimate
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x, y - size * 0.58);
      ctx.lineTo(x + size * 0.42, y);
      ctx.lineTo(x, y + size * 0.58);
      ctx.lineTo(x - size * 0.42, y);
      ctx.closePath();
      ctx.fill();
      // Highlight
      ctx.globalAlpha *= 0.55;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(x, y - size * 0.42);
      ctx.lineTo(x + size * 0.18, y - size * 0.08);
      ctx.lineTo(x, y - size * 0.04);
      ctx.closePath();
      ctx.fill();
      break;
    }
  }
  ctx.restore();
}

// ── Gesture Zone component ────────────────────────────────────────────────────
function GestureZone({ stampCanvasRef, handPipRef, stampCount, handsReady, onDone }) {
  const containerRef = useRef(null);

  // Size the stamp canvas to fill container on mount
  useEffect(() => {
    if (!containerRef.current || !stampCanvasRef.current) return;
    const { clientWidth: w, clientHeight: h } = containerRef.current;
    stampCanvasRef.current.width  = w;
    stampCanvasRef.current.height = h;
    const ctx = stampCanvasRef.current.getContext('2d');
    ctx.fillStyle = '#f9f5ef';
    ctx.fillRect(0, 0, w, h);
    // Size the hand pip canvas
    if (handPipRef.current) {
      handPipRef.current.width  = 224;
      handPipRef.current.height = 168;
    }
  }, []);

  return html`
    <div className="gesture-zone" ref=${containerRef}>
      <canvas className="stamp-canvas" ref=${stampCanvasRef} />

      <div className="hand-pip-wrap">
        <canvas className="hand-pip-canvas" ref=${handPipRef} />
        <div className="pose-label" id="pose-label">show me your hand</div>
      </div>

      ${!handsReady && html`
        <div className="hands-loading">
          <div className="hands-spinner" />
          <span>loading gesture recognition…</span>
        </div>
      `}

      <div className="gesture-footer">
        <div className="mark-count">
          ${stampCount > 0 ? `${stampCount} mark${stampCount === 1 ? '' : 's'}` : 'hold a pose to mark'}
        </div>
        <button className="done-btn" onClick=${onDone} disabled=${stampCount === 0}>
          done
        </button>
      </div>
    </div>
  `;
}

// ── Canvas Area (Fabric.js collage) ──────────────────────────────────────────
function CanvasArea({ fabricRef, isGenerating, pipVideoRef, hasVideo }) {
  const containerRef = useRef(null);
  const canvasElRef  = useRef(null);

  useEffect(() => {
    if (!canvasElRef.current || !containerRef.current) return;
    const w = containerRef.current.clientWidth;
    const h = containerRef.current.clientHeight;
    canvasElRef.current.width  = w;
    canvasElRef.current.height = h;
    const fc = new fabric.Canvas(canvasElRef.current, {
      width: w, height: h, backgroundColor: '#f9f5ef', selection: true,
    });
    fabricRef.current = fc;
    const upper = fc.upperCanvasEl;
    upper.addEventListener('dragover', (e) => e.preventDefault());
    upper.addEventListener('drop', (e) => {
      e.preventDefault();
      const src = e.dataTransfer.getData('text/plain');
      if (!src) return;
      const rect = upper.getBoundingClientRect();
      addToFabric(fc, src, e.clientX - rect.left, e.clientY - rect.top);
    });
    const onResize = () => { fc.setWidth(containerRef.current.clientWidth); fc.setHeight(containerRef.current.clientHeight); fc.renderAll(); };
    window.addEventListener('resize', onResize);
    return () => { window.removeEventListener('resize', onResize); fc.dispose(); };
  }, []);

  const remove  = () => { const fc = fabricRef.current; if (!fc) return; const o = fc.getActiveObject(); if (o) { fc.remove(o); fc.renderAll(); } };
  const clear   = () => { const fc = fabricRef.current; if (!fc) return; fc.clear(); fc.backgroundColor = '#f9f5ef'; fc.renderAll(); };
  const rotateL = () => { const fc = fabricRef.current; if (!fc) return; const o = fc.getActiveObject(); if (o) { o.rotate((o.angle||0)-15); fc.renderAll(); } };
  const rotateR = () => { const fc = fabricRef.current; if (!fc) return; const o = fc.getActiveObject(); if (o) { o.rotate((o.angle||0)+15); fc.renderAll(); } };
  const save    = () => {
    const fc = fabricRef.current; if (!fc) return;
    const a = document.createElement('a');
    a.href = fc.toDataURL({ format: 'png', quality: 1 });
    a.download = 'mixbox-' + Date.now() + '.png';
    a.click();
  };

  return html`
    <div ref=${containerRef} style=${{ position: 'absolute', inset: 0 }}>
      <canvas ref=${canvasElRef} />
      <div className="cv-toolbar">
        <button className="cv-btn" onClick=${rotateL}>↺</button>
        <button className="cv-btn" onClick=${rotateR}>↻</button>
        <button className="cv-btn" onClick=${remove}>remove</button>
        <button className="cv-btn" onClick=${clear}>clear</button>
        <button className="cv-btn" onClick=${save}>save png</button>
      </div>
      ${isGenerating && html`<div className="gen-badge">creating your image\u2026</div>`}
      <div className=${['webcam-pip', hasVideo ? 'visible' : ''].filter(Boolean).join(' ')}>
        <video ref=${pipVideoRef} muted playsinline autoplay />
        <div className="webcam-label">mix is here</div>
      </div>
    </div>
  `;
}

// ── Fabric helper ─────────────────────────────────────────────────────────────
function addToFabric(fc, src, x, y) {
  if (!fc) return;
  const opts = src.startsWith('data:') ? {} : { crossOrigin: 'anonymous' };
  fabric.Image.fromURL(src, (img) => {
    if (!img || !img.width) return;
    const scale  = Math.min(240 / img.width, 300 / img.height, 1);
    const angle  = (Math.random() - 0.5) * 30;
    const border = 14 + Math.round(Math.random() * 8);
    const sBlur  = 18 + Math.round(Math.random() * 10);
    const sOff   = 4  + Math.round(Math.random() * 6);
    const cx = x != null ? x : fc.width  / 2 + (Math.random() - 0.5) * 120;
    const cy = y != null ? y : fc.height / 2 + (Math.random() - 0.5) * 100;
    img.set({
      left: cx - (img.width  * scale) / 2,
      top:  cy - (img.height * scale) / 2,
      scaleX: scale, scaleY: scale, angle,
      cornerStyle: 'circle', cornerColor: '#7c5cbf', cornerSize: 9, transparentCorners: false,
      stroke: '#ede5d5', strokeWidth: border, strokeLineJoin: 'round',
      shadow: new fabric.Shadow({ color: 'rgba(40,30,20,0.35)', blur: sBlur, offsetX: sOff, offsetY: sOff + 2 }),
      opacity: 0.88 + Math.random() * 0.12,
    });
    fc.add(img); fc.setActiveObject(img); fc.renderAll();
  }, opts);
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [sessionActive, setSessionActive] = useState(false);
  const [status,        setStatus]        = useState('click start to meet Mix');
  const [orbState,      setOrbState]      = useState('idle');
  const [selectedColor, setSelectedColor] = useState(null);
  const [images,        setImages]        = useState([]);
  const [transcript,    setTranscript]    = useState('');
  const [isGenerating,  setIsGenerating]  = useState(false);
  const [closing,       setClosing]       = useState(false);
  const [stampCount,    setStampCount]    = useState(0);
  const [handsReady,    setHandsReady]    = useState(false);

  // flowStep: 'idle' | 'color_picked' | 'gesturing' | 'generating'
  const [flowStep, setFlowStep] = useState('idle');
  const [hasVideo, setHasVideo] = useState(false);

  // Core refs
  const wsRef            = useRef(null);
  const fabricRef        = useRef(null);
  const mediaStreamRef   = useRef(null);
  const processorRef     = useRef(null);
  const canvasIntervalRef = useRef(null);

  // Video refs — single stream source
  const videoRef    = useRef(null);   // hidden, feeds MediaPipe
  const pipVideoRef = useRef(null);   // visible PiP during collage mode
  const hasVideoRef = useRef(false);

  // Gesture refs
  const stampCanvasRef    = useRef(null);
  const handPipRef        = useRef(null);
  const handsRef          = useRef(null);
  const gestureActiveRef  = useRef(false);
  const currentPoseRef    = useRef(null);
  const poseStartRef      = useRef(null);
  const stampCooldownRef  = useRef(false);
  const stampPosesRef     = useRef([]);
  const lastPalmRef       = useRef({ x: 0.5, y: 0.5 });
  const selectedColorHexRef = useRef('#4a7fa5');

  _orbStateSetter = setOrbState;

  // ── MediaPipe onResults callback ─────────────────────────────────────────
  function onHandResults(results) {
    const pipCanvas = handPipRef.current;
    if (!pipCanvas) return;
    const ctx = pipCanvas.getContext('2d');
    const w = pipCanvas.width, h = pipCanvas.height;

    // Draw mirrored webcam frame as background
    ctx.save();
    ctx.translate(w, 0); ctx.scale(-1, 1);
    ctx.drawImage(results.image, 0, 0, w, h);
    ctx.restore();

    // Subtle dark vignette for contrast
    ctx.fillStyle = 'rgba(14,10,24,0.28)';
    ctx.fillRect(0, 0, w, h);

    let detectedPose = null;

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      const lm = results.multiHandLandmarks[0];
      // Mirror landmarks for display (webcam is front-facing)
      const mlm = lm.map(l => ({ x: 1 - l.x, y: l.y, z: l.z }));

      // Draw skeleton
      if (window.drawConnectors && window.HAND_CONNECTIONS) {
        window.drawConnectors(ctx, mlm, window.HAND_CONNECTIONS,
          { color: 'rgba(200,175,255,0.45)', lineWidth: 1.5 });
      }
      if (window.drawLandmarks) {
        window.drawLandmarks(ctx, mlm,
          { color: 'rgba(200,175,255,0.85)', fillColor: 'rgba(130,100,210,0.6)', radius: 2.5 });
      }

      // Classify pose (unmirrored landmarks)
      detectedPose = classifyPose(lm);

      // Palm center (mirrored for pip position)
      const pc = palmCenter(lm);
      const palmX = (1 - pc.x) * w;
      const palmY = pc.y * h;

      // Store for stamp positioning
      lastPalmRef.current = { x: 1 - pc.x, y: pc.y };

      // Draw progress arc around palm
      const now = Date.now();
      if (detectedPose && detectedPose === currentPoseRef.current
          && poseStartRef.current && !stampCooldownRef.current) {
        const pct = Math.min((now - poseStartRef.current) / 1500, 1);
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(220,190,100,0.9)';
        ctx.lineWidth = 3;
        ctx.arc(palmX, palmY, 20, -Math.PI / 2, -Math.PI / 2 + pct * Math.PI * 2);
        ctx.stroke();
      }

      // Palm dot
      ctx.beginPath();
      ctx.fillStyle = 'rgba(255,220,120,0.75)';
      ctx.arc(palmX, palmY, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Pose state machine
    if (detectedPose !== currentPoseRef.current) {
      currentPoseRef.current = detectedPose;
      poseStartRef.current = detectedPose ? Date.now() : null;
      // Update pose label (direct DOM, no React re-render)
      const label = document.getElementById('pose-label');
      if (label) label.textContent = detectedPose ? POSE_LABELS[detectedPose] || detectedPose : 'show me your hand';
    } else if (
      detectedPose &&
      poseStartRef.current &&
      !stampCooldownRef.current &&
      Date.now() - poseStartRef.current >= 1500
    ) {
      doStamp(detectedPose);
    }
  }

  // ── Stamp action ─────────────────────────────────────────────────────────
  function doStamp(pose) {
    stampCooldownRef.current = true;
    const canvas = stampCanvasRef.current;
    if (!canvas) { stampCooldownRef.current = false; return; }

    const pos = lastPalmRef.current;
    const x = pos.x * canvas.width;
    const y = pos.y * canvas.height;
    const ctx = canvas.getContext('2d');

    drawStamp(ctx, pose, x, y, selectedColorHexRef.current);
    stampPosesRef.current.push(pose);
    setStampCount(prev => prev + 1);

    // Cooldown: 1s before next stamp
    setTimeout(() => {
      stampCooldownRef.current = false;
      poseStartRef.current = Date.now(); // must re-hold for 1.5s after cooldown
    }, 1000);
  }

  // ── Load a CDN script dynamically, returning a Promise ──────────────────
  function loadScript(src) {
    return new Promise((resolve, reject) => {
      // Already loaded?
      if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
      const s = document.createElement('script');
      s.src = src; s.crossOrigin = 'anonymous';
      s.onload = resolve;
      s.onerror = () => reject(new Error(`Failed to load ${src}`));
      document.head.appendChild(s);
    });
  }

  // ── MediaPipe init + frame loop ──────────────────────────────────────────
  async function startGestureMode() {
    if (gestureActiveRef.current) return;
    gestureActiveRef.current = true;
    setHandsReady(false);

    if (!handsRef.current) {
      try {
        // Load MediaPipe lazily — only when gesture mode first starts
        await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js');
        await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js');

        const h = new window.Hands({
          locateFile: (file) =>
            `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`,
        });
        h.setOptions({
          maxNumHands: 1,
          modelComplexity: 1,
          minDetectionConfidence: 0.7,
          minTrackingConfidence: 0.5,
        });
        h.onResults(onHandResults);
        await h.initialize();
        handsRef.current = h;
      } catch (e) {
        console.error('MediaPipe Hands init failed:', e);
        gestureActiveRef.current = false;
        return;
      }
    }

    setHandsReady(true);
    scheduleHandFrame();
  }

  function scheduleHandFrame() {
    if (!gestureActiveRef.current) return;
    setTimeout(async () => {
      const video = videoRef.current;
      if (video && video.readyState >= 2 && handsRef.current && gestureActiveRef.current) {
        try { await handsRef.current.send({ image: video }); } catch (_) {}
      }
      scheduleHandFrame();
    }, 100); // 10 fps — enough for reliable pose detection
  }

  function stopGestureMode() {
    gestureActiveRef.current  = false;
    currentPoseRef.current    = null;
    poseStartRef.current      = null;
    stampCooldownRef.current  = false;
  }

  // ── Color handler ─────────────────────────────────────────────────────────
  const handleColor = useCallback((c) => {
    setSelectedColor(c.name);
    selectedColorHexRef.current = c.hex;
    setFlowStep('color_picked');
    setStampCount(0);
    stampPosesRef.current = [];

    // Clear stamp canvas for fresh start
    if (stampCanvasRef.current) {
      const ctx = stampCanvasRef.current.getContext('2d');
      ctx.fillStyle = '#f9f5ef';
      ctx.fillRect(0, 0, stampCanvasRef.current.width, stampCanvasRef.current.height);
    }

    // Stop any running gesture mode
    stopGestureMode();

    // Notify backend (color pick triggers Mix response + gesture invitation)
    if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
      wsRef.current.send(JSON.stringify({
        type: 'canvas_action', action_type: 'color', value: c.name, hex: c.hex,
      }));
    }

    // Start gesture mode after a short delay (let Mix acknowledge the color first)
    setTimeout(() => {
      setFlowStep('gesturing');
      // Resize stamp canvas now that it's about to become visible
      if (stampCanvasRef.current && stampCanvasRef.current.parentElement) {
        const parent = stampCanvasRef.current.closest('.gesture-zone');
        if (parent) {
          const w = parent.clientWidth  || window.innerWidth  - 450;
          const h = parent.clientHeight || window.innerHeight - 128;
          stampCanvasRef.current.width  = w;
          stampCanvasRef.current.height = h;
          const ctx = stampCanvasRef.current.getContext('2d');
          ctx.fillStyle = '#f9f5ef';
          ctx.fillRect(0, 0, w, h);
        }
      }
      startGestureMode();
    }, 1800);
  }, []);

  // ── Done handler — export stamp canvas → trigger generation ──────────────
  const handleDone = useCallback(() => {
    stopGestureMode();
    setFlowStep('generating');

    // Export stamp canvas as JPEG
    let sketchB64 = null;
    if (stampCanvasRef.current) {
      sketchB64 = stampCanvasRef.current.toDataURL('image/jpeg', 0.85).split(',')[1];
    }

    if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
      wsRef.current.send(JSON.stringify({
        type:        'canvas_action',
        action_type: 'done',
        sketch_b64:  sketchB64,
        stamp_poses: stampPosesRef.current,
      }));
    }
  }, []);

  const handleImageClick = useCallback((src) => {
    addToFabric(fabricRef.current, src);
  }, []);

  // ── Start session ─────────────────────────────────────────────────────────
  const startSession = useCallback(async () => {
    setStatus('requesting mic & camera\u2026');
    try {
      _audioCtx = new AudioContext();
      mediaStreamRef.current = await navigator.mediaDevices.getUserMedia({
        audio: true,
        video: { width: 320, height: 240, facingMode: 'user' },
      });
      hasVideoRef.current = true;
      setHasVideo(true);
    } catch {
      try {
        mediaStreamRef.current = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        hasVideoRef.current = false; setHasVideo(false);
      } catch {
        setStatus('mic access denied'); return;
      }
    }

    // Wire hidden video (MediaPipe source) + PiP to stream
    if (hasVideoRef.current) {
      if (videoRef.current) {
        videoRef.current.srcObject = mediaStreamRef.current;
        videoRef.current.play().catch(() => {});
      }
      if (pipVideoRef.current) {
        pipVideoRef.current.srcObject = mediaStreamRef.current;
        pipVideoRef.current.play().catch(() => {});
      }
    }

    setStatus('connecting to Mix\u2026');
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(proto + '://' + location.host + '/ws');
    ws.binaryType = 'arraybuffer';
    wsRef.current = ws;

    ws.onopen = () => {
      setSessionActive(true);
      setStatus('Mix is waking up\u2026');
      setOrbState('listening');
      setTranscript('');
      setFlowStep('idle');

      const amb = document.getElementById('ambient');
      amb.volume = 0.08;
      amb.play().catch(() => {});

      // Mic capture
      const source = _audioCtx.createMediaStreamSource(mediaStreamRef.current);
      const proc   = _audioCtx.createScriptProcessor(4096, 1, 1);
      proc.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const input = e.inputBuffer.getChannelData(0);
        const ratio = _audioCtx.sampleRate / 16000;
        const outLen = Math.round(input.length / ratio);
        const res = new Float32Array(outLen);
        for (let i = 0; i < outLen; i++) res[i] = input[Math.round(i * ratio)];
        ws.send(float32ToInt16(res).buffer);
      };
      source.connect(proc); proc.connect(_audioCtx.destination);
      processorRef.current = proc;

      // Canvas stream — Mix sees the collage every 2s
      canvasIntervalRef.current = setInterval(() => {
        if (!ws || ws.readyState !== WebSocket.OPEN || !fabricRef.current) return;
        const b64 = fabricRef.current.toDataURL('image/jpeg', 0.5).split(',')[1];
        ws.send(JSON.stringify({ type: 'image', data: b64, mimeType: 'image/jpeg', source: 'canvas' }));
      }, 2000);
    };

    ws.onmessage = (event) => {
      if (event.data instanceof ArrayBuffer) { enqueueAudio(event.data); return; }
      try {
        const msg = JSON.parse(event.data);
        if (msg.transcript) setTranscript(msg.transcript);

        // Voice selected a color
        if (msg.type === 'voice_select' && msg.kind === 'color') {
          const color = COLORS.find(c => c.name === msg.value);
          if (color) handleColor(color);
        }

        // Voice said "done" — trigger same as button
        if (msg.type === 'voice_done') {
          handleDone();
        }

        if (msg.type === 'generated_image') {
          setIsGenerating(false);
          setFlowStep('idle');
          setSelectedColor(null);
          const src = msg.url || 'data:image/jpeg;base64,' + msg.data;
          setImages(prev => [{ id: Date.now() + Math.random(), src }, ...prev]);
          addToFabric(fabricRef.current, src);
          setStatus('image added');
          setTimeout(() => setStatus(''), 2500);
        }

        if (msg.type === 'generating_canvas_image') {
          setIsGenerating(true);
          setStatus('creating your image\u2026');
        }

        if (msg.error) setStatus('error: ' + msg.error);
      } catch (_) {}
    };

    ws.onclose = () => { setSessionActive(false); setStatus('session ended'); setOrbState('idle'); setFlowStep('idle'); };
    ws.onerror = () => { setStatus('connection error \u2014 is the server running?'); };
  }, [handleColor, handleDone]);

  // ── End session ───────────────────────────────────────────────────────────
  const endSession = useCallback(() => {
    stopGestureMode();
    if (processorRef.current)     { processorRef.current.disconnect(); processorRef.current = null; }
    if (mediaStreamRef.current)   { mediaStreamRef.current.getTracks().forEach(t => t.stop()); mediaStreamRef.current = null; }
    if (canvasIntervalRef.current){ clearInterval(canvasIntervalRef.current); canvasIntervalRef.current = null; }
    if (wsRef.current)            { wsRef.current.close(); wsRef.current = null; }
    if (_audioCtx)                { _audioCtx.close(); _audioCtx = null; }
    if (videoRef.current)         { videoRef.current.srcObject = null; }
    if (pipVideoRef.current)      { pipVideoRef.current.srcObject = null; }
    const amb = document.getElementById('ambient');
    amb.pause(); amb.currentTime = 0;
    _playbackQueue = []; _isPlaying = false;
    hasVideoRef.current = false;
    setHasVideo(false); setSessionActive(false); setOrbState('idle');
    setStatus('session ended \u2014 click start to begin again');
    setTranscript(''); setSelectedColor(null);
    setFlowStep('idle'); setClosing(false); setStampCount(0); setHandsReady(false);
  }, []);

  const initiateClose = useCallback(() => {
    if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
      wsRef.current.send(JSON.stringify({ type: 'session_close' }));
    }
    setClosing(true);
  }, []);

  const saveAndEnd = useCallback(() => {
    const fc = fabricRef.current;
    if (fc) {
      const a = document.createElement('a');
      a.href = fc.toDataURL({ format: 'png', quality: 1 });
      a.download = 'mixbox-' + Date.now() + '.png';
      a.click();
    }
    setTimeout(endSession, 500);
  }, [endSession]);

  const isGesturing = flowStep === 'gesturing';

  return html`
    <div className="app-grid">
      <${Header} status=${status} orbState=${orbState} />
      <${Sidebar}
        selectedColor=${selectedColor}
        onColor=${handleColor}
        images=${images}
        isGenerating=${isGenerating}
        sessionActive=${sessionActive}
        flowStep=${flowStep}
        stampCount=${stampCount}
        onImageClick=${handleImageClick}
      />

      <main className="cv">
        <div style=${{ display: isGesturing ? 'block' : 'none', position: 'absolute', inset: 0, zIndex: 2 }}>
          <${GestureZone}
            stampCanvasRef=${stampCanvasRef}
            handPipRef=${handPipRef}
            stampCount=${stampCount}
            handsReady=${handsReady}
            onDone=${handleDone}
          />
        </div>
        <div style=${{ display: isGesturing ? 'none' : 'block', position: 'absolute', inset: 0, zIndex: 1 }}>
          <${CanvasArea}
            fabricRef=${fabricRef}
            isGenerating=${isGenerating}
            pipVideoRef=${pipVideoRef}
            hasVideo=${hasVideo}
          />
        </div>
      </main>

      <${OrbPanel} orbState=${orbState} transcript=${transcript} />
      <${Footer} sessionActive=${sessionActive} status=${status} onStart=${startSession} onStop=${initiateClose} />
    </div>
    ${closing && html`
      <${CloseOverlay}
        message=${CLOSE_MSGS[Math.floor(Math.random() * CLOSE_MSGS.length)]}
        onSave=${saveAndEnd}
        onEnd=${endSession}
      />
    `}
    <video ref=${videoRef} style=${{ display: 'none' }} muted playsinline />
  `;
}

// ── Mount ────────────────────────────────────────────────────────────────────
try {
  ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  // React mounted — remove the loading overlay
  var pre = document.getElementById('pre-render');
  if (pre) pre.remove();
} catch (e) {
  var pre = document.getElementById('pre-render');
  if (pre) {
    pre.style.flexDirection = 'column';
    pre.style.gap = '12px';
    pre.innerHTML =
      '<div style="font-size:1rem;color:#c24a3c;">React failed to mount</div>' +
      '<div style="max-width:500px;text-align:center;color:#7a6a5a;line-height:1.7;">' + e.message + '</div>' +
      '<div style="margin-top:8px;color:#7a6a5a;">Try a hard refresh (Cmd+Shift+R / Ctrl+Shift+R)</div>';
  }
  console.error('React mount failed:', e);
}
</script>
</body>
</html>
