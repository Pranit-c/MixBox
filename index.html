<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MixBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #ede8df;
      --surface2: #e4ddd3;
      --border: #d4c9b5;
      --earth: #7c5cbf;
      --earth-dim: #5a3f9a;
      --earth-light: #a08dd4;
      --sage: #6b7c5a;
      --clay: #b07d5a;
      --text: #3d3530;
      --text-dim: #7a6a5a;
      --text-muted: #a89880;
      --voice: #6b4f3a;
      --tr: 0.2s ease;
    }

    html, body { height: 100%; font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); overflow: hidden; }

    /* Layout */
    .app-grid {
      display: grid;
      grid-template-columns: 250px 1fr 200px;
      grid-template-rows: 48px 1fr 80px;
      grid-template-areas: "hd hd hd" "sb cv op" "ft ft ft";
      height: 100vh;
    }

    /* Header */
    .hd { grid-area: hd; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--surface); z-index: 10; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 300; letter-spacing: 0.12em; }
    .logo-accent { color: var(--earth); }
    .status-bar { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.08em; display: flex; align-items: center; gap: 7px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: all var(--tr); }
    .status-dot.live { background: var(--sage); box-shadow: 0 0 8px rgba(107,124,90,0.5); }
    .status-dot.speaking { background: var(--clay); box-shadow: 0 0 8px rgba(176,125,90,0.6); animation: blink 0.6s ease-in-out infinite alternate; }
    @keyframes blink { from { opacity: 0.5 } to { opacity: 1 } }

    /* Sidebar */
    .sb { grid-area: sb; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow: hidden; }
    .section-hd {
      padding: 10px 14px 6px;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      text-transform: uppercase;
      flex-shrink: 0;
      transition: color var(--tr);
    }
    .section-hd.active { color: var(--earth); }
    .section-div { height: 1px; background: var(--border); margin: 2px 0; flex-shrink: 0; }

    /* Colors */
    .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; padding: 4px 14px 10px; flex-shrink: 0; }
    .color-swatch {
      aspect-ratio: 1; border-radius: 50%; cursor: pointer;
      border: 2.5px solid transparent;
      box-shadow: 0 1px 4px rgba(61,53,48,0.18);
      transition: transform var(--tr), border-color var(--tr), box-shadow var(--tr), opacity var(--tr);
    }
    .color-swatch:hover { transform: scale(1.15); box-shadow: 0 3px 10px rgba(61,53,48,0.25); }
    .color-swatch.sel { border-color: var(--earth); transform: scale(1.1); box-shadow: 0 0 14px rgba(124,92,191,0.45); }
    .color-swatch.white-ring { border-color: var(--border); }
    .color-swatch.dimmed { opacity: 0.35; pointer-events: none; }

    /* Shapes */
    .shape-grid { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 14px 10px; flex-shrink: 0; }
    .shape-btn {
      width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface2); cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--tr); color: var(--text-dim); user-select: none;
    }
    .shape-btn:hover { border-color: var(--earth-light); transform: scale(1.06); color: var(--earth); }
    .shape-btn.sel { border-color: var(--earth); background: rgba(124,92,191,0.08); color: var(--earth); box-shadow: 0 0 10px rgba(124,92,191,0.22); }
    .shape-btn.dimmed { opacity: 0.3; pointer-events: none; }
    .shape-btn.ready { border-color: var(--earth-light); background: rgba(124,92,191,0.05); }

    /* Step indicator */
    .step-hint {
      padding: 4px 14px 8px;
      font-size: 0.56rem;
      color: var(--earth);
      letter-spacing: 0.1em;
      font-style: italic;
      opacity: 0;
      transition: opacity 0.4s ease;
      flex-shrink: 0;
    }
    .step-hint.visible { opacity: 1; }

    /* Palette */
    .palette-scroll { flex: 1; overflow-y: auto; padding: 4px 10px 10px; }
    .palette-scroll::-webkit-scrollbar { width: 3px; }
    .palette-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .palette-empty { padding: 16px 4px; text-align: center; color: var(--text-muted); font-size: 0.75rem; line-height: 1.9; font-family: 'Cormorant Garamond', serif; font-style: italic; }
    .palette-item {
      border-radius: 8px; border: 1px solid var(--border); overflow: hidden;
      cursor: pointer; position: relative; background: var(--surface2);
      margin-bottom: 7px;
      opacity: 0; transform: scale(0.92) translateY(8px);
      animation: img-arrive 0.5s ease forwards;
      transition: border-color var(--tr), box-shadow var(--tr);
    }
    .palette-item:hover { border-color: var(--earth); box-shadow: 0 4px 16px rgba(124,92,191,0.15); }
    .palette-item img { width: 100%; height: auto; display: block; }
    .palette-item .hint-overlay {
      position: absolute; inset: 0;
      background: rgba(124,92,191,0.3); display: flex;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity var(--tr);
      font-size: 0.58rem; color: white; letter-spacing: 0.08em;
    }
    .palette-item:hover .hint-overlay { opacity: 1; }
    @keyframes img-arrive {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Generating skeleton */
    .gen-skeleton {
      height: 70px; border-radius: 8px; margin-bottom: 7px;
      background: linear-gradient(90deg, var(--surface2) 0%, var(--border) 50%, var(--surface2) 100%);
      background-size: 200% 100%; animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }

    /* Canvas */
    .cv { grid-area: cv; position: relative; background: var(--bg); overflow: hidden; }
    .cv canvas { display: block; }
    .cv-toolbar {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 4px 10px; z-index: 5;
      opacity: 0; transition: opacity var(--tr); box-shadow: 0 2px 10px rgba(61,53,48,0.08);
    }
    .cv:hover .cv-toolbar { opacity: 1; }
    .cv-btn {
      background: none; border: none; color: var(--text-muted);
      font-size: 0.6rem; letter-spacing: 0.07em; padding: 3px 8px;
      border-radius: 12px; cursor: pointer; transition: all var(--tr);
      font-family: 'DM Mono', monospace;
    }
    .cv-btn:hover { background: var(--surface2); color: var(--text); }
    .gen-badge {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--earth-light);
      border-radius: 18px; padding: 6px 16px; font-size: 0.6rem;
      color: var(--earth); letter-spacing: 0.08em; z-index: 10;
      box-shadow: 0 2px 12px rgba(124,92,191,0.15);
      animation: img-arrive 0.3s ease forwards;
    }

    /* Webcam PiP — small preview in canvas corner, visible during session */
    .webcam-pip {
      position: absolute; top: 14px; right: 14px;
      width: 108px; height: 80px; border-radius: 10px;
      overflow: hidden; border: 1.5px solid var(--border);
      background: var(--surface2); z-index: 8;
      opacity: 0; transition: opacity 0.6s ease;
      box-shadow: 0 2px 12px rgba(61,53,48,0.12);
    }
    .webcam-pip.visible { opacity: 1; }
    .webcam-pip video {
      width: 100%; height: 100%; object-fit: cover;
      transform: scaleX(-1);
    }
    .webcam-label {
      position: absolute; bottom: 5px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.46rem; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.7); white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    /* Beacon — guiding light that follows user's movement on the canvas */
    .beacon {
      position: absolute;
      width: 56px; height: 56px;
      margin-left: -28px; margin-top: -28px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(245,210,110,0.82) 0%,
        rgba(210,155,60,0.38) 52%,
        transparent 82%);
      box-shadow:
        0 0 24px rgba(245,210,110,0.45),
        0 0 52px rgba(210,155,60,0.18);
      pointer-events: none;
      z-index: 7;
      opacity: 0;
      transition: opacity 0.8s ease;
      animation: beaconPulse 3.4s ease-in-out infinite;
    }
    .beacon.visible { opacity: 1; }
    @keyframes beaconPulse {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 24px rgba(245,210,110,0.45), 0 0 52px rgba(210,155,60,0.18); }
      50%       { transform: scale(1.22); box-shadow: 0 0 36px rgba(245,210,110,0.6),  0 0 70px rgba(210,155,60,0.28); }
    }

    /* Orb panel */
    .op { grid-area: op; border-left: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; align-items: center; padding: 22px 14px 14px; gap: 16px; }
    .orb-wrap { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .orb {
      width: 64px; height: 64px; border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #e8d5b0, #b07d5a 45%, #7c5cbf 70%, #4a2a7a);
      box-shadow: 0 0 20px rgba(176,125,90,0.22);
      transition: transform var(--tr), box-shadow var(--tr);
      position: relative; z-index: 2;
    }
    .orb-wrap::before, .orb-wrap::after {
      content: ''; position: absolute; border-radius: 50%;
      border: 1px solid var(--clay); opacity: 0; pointer-events: none;
    }
    .orb-wrap.listening::before { width: 80px; height: 80px; animation: ripple 2.5s ease-out infinite; }
    .orb-wrap.listening::after  { width: 80px; height: 80px; animation: ripple 2.5s ease-out infinite 0.8s; }
    @keyframes ripple { 0% { transform: scale(0.85); opacity: 0.5 } 100% { transform: scale(1.5); opacity: 0 } }
    .orb-wrap.listening .orb { transform: scale(1.05); box-shadow: 0 0 36px rgba(176,125,90,0.3); }
    .orb-wrap.speaking .orb  { animation: orbspeak 0.6s ease-in-out infinite alternate; box-shadow: 0 0 44px rgba(124,92,191,0.4); }
    @keyframes orbspeak { from { transform: scale(1.02) } to { transform: scale(1.1) } }

    .transcript {
      width: 100%; flex: 1; min-height: 0; overflow-y: auto;
      font-family: 'Cormorant Garamond', serif; font-size: 0.85rem;
      font-style: italic; color: var(--voice); line-height: 1.9; text-align: center;
    }
    .transcript::-webkit-scrollbar { width: 2px; }
    .transcript::-webkit-scrollbar-thumb { background: var(--border); }

    /* Footer */
    .ft { grid-area: ft; border-top: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .ft-group { display: flex; align-items: center; gap: 8px; }
    .btn {
      padding: 8px 20px; border-radius: 8px; font-family: 'DM Mono', monospace;
      font-size: 0.7rem; letter-spacing: 0.08em; cursor: pointer;
      transition: all var(--tr); border: 1px solid transparent;
    }
    .btn-start { background: var(--earth); color: white; border-color: var(--earth); }
    .btn-start:hover:not(:disabled) { background: var(--earth-light); box-shadow: 0 0 16px rgba(124,92,191,0.25); }
    .btn-start:disabled { opacity: 0.4; cursor: default; }
    .btn-stop { background: transparent; color: var(--text-muted); border-color: var(--border); }
    .btn-stop:hover:not(:disabled) { border-color: var(--clay); color: var(--clay); }
    .btn-stop:disabled { opacity: 0.3; cursor: default; }
    .ft-status { font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.06em; }

    /* Close overlay */
    .close-ov {
      position: fixed; inset: 0; background: rgba(245,240,232,0.94);
      z-index: 100; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px;
      backdrop-filter: blur(8px); animation: fadein 0.4s ease;
    }
    .close-orb {
      width: 72px; height: 72px; border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #e8d5b0, #b07d5a 45%, #7c5cbf 70%, #4a2a7a);
      box-shadow: 0 0 50px rgba(176,125,90,0.3);
      animation: orbspeak 0.8s ease-in-out infinite alternate;
    }
    .close-msg {
      max-width: 400px; text-align: center;
      font-family: 'Cormorant Garamond', serif; font-size: 1.2rem;
      font-weight: 300; line-height: 1.9; color: var(--voice); font-style: italic;
    }
    .close-btns { display: flex; gap: 10px; }
    .close-primary { padding: 10px 24px; background: var(--earth); color: white; border: none; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; cursor: pointer; }
    .close-secondary { padding: 10px 24px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; cursor: pointer; }
    @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }

    /* Paper texture */
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; opacity: 0.6; mix-blend-mode: multiply; z-index: 1000;
    }
  </style>
</head>

<body>
<div id="root"></div>
<audio id="ambient" src="/static/ambient.mp3" loop preload="auto"></audio>

<script>
// ── React setup ────────────────────────────────────────────────────────────
const { useState, useRef, useEffect, useCallback } = React;
const html = htm.bind(React.createElement);

// ── Data ───────────────────────────────────────────────────────────────────
const COLORS = [
  { name: 'blue',   hex: '#4a7fa5' }, { name: 'teal',   hex: '#3d8c8c' },
  { name: 'green',  hex: '#4a7c59' }, { name: 'yellow', hex: '#dbb84a' },
  { name: 'orange', hex: '#d4783c' }, { name: 'red',    hex: '#c24a3c' },
  { name: 'pink',   hex: '#cc7a90' }, { name: 'purple', hex: '#7c5cbf' },
  { name: 'brown',  hex: '#7c5a3c' }, { name: 'black',  hex: '#2a2520' },
  { name: 'white',  hex: '#f5f0e8' }, { name: 'gold',   hex: '#c9a840' },
];
const SHAPES = [
  { name: 'circle', s: '\u25EF' }, { name: 'square', s: '\u25A1' },
  { name: 'triangle', s: '\u25B3' }, { name: 'star', s: '\u2726' },
  { name: 'spiral', s: '\u25CE' }, { name: 'wave', s: '\u223F' },
  { name: 'cloud', s: '\u2601' },
];
const CLOSE_MSGS = [
  "You showed up today and made something. That matters.",
  "What you made here belongs to you. Every choice was yours.",
  "Something happened here today. I witnessed it. Thank you.",
  "You brought yourself to this canvas. You carry this with you.",
];

// ── Audio helpers (module-level refs) ──────────────────────────────────────
let _audioCtx = null;
let _playbackQueue = [];
let _isPlaying = false;
let _orbStateSetter = null;

function float32ToInt16(f32) {
  const out = new Int16Array(f32.length);
  for (let i = 0; i < f32.length; i++) {
    const s = Math.max(-1, Math.min(1, f32[i]));
    out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }
  return out;
}

function enqueueAudio(buffer) {
  _playbackQueue.push(buffer);
  if (!_isPlaying) drainQueue();
}

function drainQueue() {
  if (!_playbackQueue.length || !_audioCtx) {
    _isPlaying = false;
    if (_orbStateSetter) _orbStateSetter('listening');
    return;
  }
  _isPlaying = true;
  if (_orbStateSetter) _orbStateSetter('speaking');
  const int16 = new Int16Array(_playbackQueue.shift());
  const f32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / (int16[i] < 0 ? 0x8000 : 0x7fff);
  const buf = _audioCtx.createBuffer(1, f32.length, 24000);
  buf.copyToChannel(f32, 0);
  const src = _audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(_audioCtx.destination);
  src.onended = drainQueue;
  src.start();
}

// ── Components ─────────────────────────────────────────────────────────────

function Header({ status, orbState }) {
  const dotCls = 'status-dot' + (orbState === 'listening' ? ' live' : orbState === 'speaking' ? ' speaking' : '');
  return html`
    <header className="hd">
      <div className="logo">Mix<span className="logo-accent">Box</span></div>
      <div className="status-bar">
        <div className=${dotCls} />
        <span>${status}</span>
      </div>
    </header>
  `;
}

function ColorPicker({ selected, onSelect, disabled }) {
  return html`
    <div className="color-grid">
      ${COLORS.map(c => html`
        <div
          key=${c.name}
          className=${[
            'color-swatch',
            selected === c.name && 'sel',
            c.name === 'white' && !selected && 'white-ring',
            disabled && 'dimmed',
          ].filter(Boolean).join(' ')}
          style=${{ backgroundColor: c.hex }}
          title=${c.name}
          onClick=${() => !disabled && onSelect(c)}
        />
      `)}
    </div>
  `;
}

function ShapePicker({ selected, onSelect, disabled, ready }) {
  return html`
    <div className="shape-grid">
      ${SHAPES.map(s => html`
        <button
          key=${s.name}
          className=${[
            'shape-btn',
            selected === s.name && 'sel',
            disabled && 'dimmed',
            !disabled && ready && !selected && 'ready',
          ].filter(Boolean).join(' ')}
          title=${s.name}
          onClick=${() => !disabled && onSelect(s)}
        >${s.s}</button>
      `)}
    </div>
  `;
}

function PaletteImage({ src, onClick }) {
  return html`
    <div className="palette-item" onClick=${() => onClick(src)} draggable="true"
      onDragStart=${(e) => e.dataTransfer.setData('text/plain', src)}>
      <img src=${src} alt="" />
      <div className="hint-overlay">click or drag to canvas</div>
    </div>
  `;
}

function Sidebar({ selectedColor, selectedShape, onColor, onShape, images, isGenerating, sessionActive, flowStep, onImageClick }) {
  // Disabled states based on flow step
  const generating = flowStep === 'generating';
  const colorDisabled  = !sessionActive || generating;
  const shapeDisabled  = !sessionActive || !selectedColor || generating;
  const shapeReady     = sessionActive && !!selectedColor && flowStep === 'color_picked';

  // Section header labels guide the user through the ritual
  const colorLabel = !sessionActive
    ? 'choose a color'
    : flowStep === 'idle' ? 'choose a color' : 'color';
  const shapeLabel = shapeReady
    ? 'now — a shape'
    : generating
      ? 'creating\u2026'
      : 'then a shape';

  return html`
    <aside className="sb">
      <div className=${['section-hd', shapeReady || flowStep === 'idle' ? '' : 'active'].filter(Boolean).join(' ')}>
        ${colorLabel}
      </div>
      <${ColorPicker} selected=${selectedColor} onSelect=${onColor} disabled=${colorDisabled} />
      <div className="section-div" />
      <div className=${['section-hd', shapeReady ? 'active' : ''].filter(Boolean).join(' ')}>
        ${shapeLabel}
      </div>
      <${ShapePicker}
        selected=${selectedShape}
        onSelect=${onShape}
        disabled=${shapeDisabled}
        ready=${shapeReady}
      />
      <div className="section-div" />
      <div className="section-hd">your palette</div>
      <div className="palette-scroll">
        ${isGenerating && html`<div className="gen-skeleton" />`}
        ${images.length === 0 && !isGenerating && html`
          <div className="palette-empty">choose color → shape → gesture and your image will appear here</div>
        `}
        ${images.map(img => html`
          <${PaletteImage} key=${img.id} src=${img.src} onClick=${onImageClick} />
        `)}
      </div>
    </aside>
  `;
}

function CanvasArea({ fabricRef, isGenerating, pipVideoRef, hasVideo, beaconElRef }) {
  const containerRef = useRef(null);
  const canvasElRef = useRef(null);

  useEffect(() => {
    if (!canvasElRef.current || !containerRef.current) return;
    const w = containerRef.current.clientWidth;
    const h = containerRef.current.clientHeight;
    canvasElRef.current.width = w;
    canvasElRef.current.height = h;
    const fc = new fabric.Canvas(canvasElRef.current, {
      width: w, height: h, backgroundColor: '#f9f5ef', selection: true,
    });
    fabricRef.current = fc;

    const upper = fc.upperCanvasEl;
    upper.addEventListener('dragover', (e) => e.preventDefault());
    upper.addEventListener('drop', (e) => {
      e.preventDefault();
      const src = e.dataTransfer.getData('text/plain');
      if (!src) return;
      const rect = upper.getBoundingClientRect();
      addToFabric(fc, src, e.clientX - rect.left, e.clientY - rect.top);
    });

    const onResize = () => {
      fc.setWidth(containerRef.current.clientWidth);
      fc.setHeight(containerRef.current.clientHeight);
      fc.renderAll();
    };
    window.addEventListener('resize', onResize);
    return () => { window.removeEventListener('resize', onResize); fc.dispose(); };
  }, []);

  const remove  = () => { const fc = fabricRef.current; if (!fc) return; const o = fc.getActiveObject(); if (o) { fc.remove(o); fc.renderAll(); } };
  const clear   = () => { const fc = fabricRef.current; if (!fc) return; fc.clear(); fc.backgroundColor = '#f9f5ef'; fc.renderAll(); };
  const rotateL = () => { const fc = fabricRef.current; if (!fc) return; const o = fc.getActiveObject(); if (o) { o.rotate((o.angle || 0) - 15); fc.renderAll(); } };
  const rotateR = () => { const fc = fabricRef.current; if (!fc) return; const o = fc.getActiveObject(); if (o) { o.rotate((o.angle || 0) + 15); fc.renderAll(); } };
  const save    = () => {
    const fc = fabricRef.current; if (!fc) return;
    const a = document.createElement('a');
    a.href = fc.toDataURL({ format: 'png', quality: 1 });
    a.download = 'mixbox-' + Date.now() + '.png';
    a.click();
  };

  return html`
    <main className="cv" ref=${containerRef}>
      <canvas ref=${canvasElRef} />
      <div className="cv-toolbar">
        <button className="cv-btn" onClick=${rotateL} title="rotate left">↺</button>
        <button className="cv-btn" onClick=${rotateR} title="rotate right">↻</button>
        <button className="cv-btn" onClick=${remove}>remove</button>
        <button className="cv-btn" onClick=${clear}>clear</button>
        <button className="cv-btn" onClick=${save}>save png</button>
      </div>
      ${isGenerating && html`<div className="gen-badge">creating your image\u2026</div>`}
      ${html`
        <div className=${['beacon', hasVideo && 'visible'].filter(Boolean).join(' ')}
             ref=${beaconElRef}
             style=${{ left: '50%', top: '50%' }}
        />
      `}
      ${hasVideo && html`
        <div className=${['webcam-pip', 'visible'].join(' ')}>
          <video ref=${pipVideoRef} muted playsinline autoplay />
          <div className="webcam-label">mix is here</div>
        </div>
      `}
    </main>
  `;
}

function OrbPanel({ orbState, transcript }) {
  return html`
    <aside className="op">
      <div className=${['orb-wrap', orbState !== 'idle' && orbState].filter(Boolean).join(' ')}>
        <div className="orb" />
      </div>
      <div className="transcript">${transcript || '\u2026'}</div>
    </aside>
  `;
}

function Footer({ sessionActive, status, onStart, onStop }) {
  return html`
    <footer className="ft">
      <div className="ft-group">
        <button className="btn btn-start" disabled=${sessionActive} onClick=${onStart}>start session</button>
        <button className="btn btn-stop" disabled=${!sessionActive} onClick=${onStop}>end session</button>
      </div>
      <div className="ft-status">${status}</div>
      <div className="ft-group">
        ${sessionActive && html`<button className="btn btn-stop" onClick=${onStop}>close & save</button>`}
      </div>
    </footer>
  `;
}

function CloseOverlay({ message, onSave, onEnd }) {
  return html`
    <div className="close-ov">
      <div className="close-orb" />
      <div className="close-msg">${message}</div>
      <div className="close-btns">
        <button className="close-primary" onClick=${onSave}>save my collage</button>
        <button className="close-secondary" onClick=${onEnd}>end without saving</button>
      </div>
    </div>
  `;
}

// ── Fabric helper ──────────────────────────────────────────────────────────
function addToFabric(fc, src, x, y) {
  if (!fc) return;
  // Only set crossOrigin for real http(s) URLs, not data: URIs
  const opts = src.startsWith('data:') ? {} : { crossOrigin: 'anonymous' };

  fabric.Image.fromURL(src, (img) => {
    if (!img || !img.width) return;

    const scale  = Math.min(240 / img.width, 300 / img.height, 1);
    const angle  = (Math.random() - 0.5) * 30;           // ±15° — natural scatter
    const border = 14 + Math.round(Math.random() * 8);   // 14–22px thick cream border
    const sBlur  = 18 + Math.round(Math.random() * 10);  // 18–28px soft shadow
    const sOff   = 4 + Math.round(Math.random() * 6);    // 4–10px shadow offset

    const cx = x != null ? x : fc.width  / 2 + (Math.random() - 0.5) * 120;
    const cy = y != null ? y : fc.height / 2 + (Math.random() - 0.5) * 100;

    img.set({
      left:   cx - (img.width  * scale) / 2,
      top:    cy - (img.height * scale) / 2,
      scaleX: scale,
      scaleY: scale,
      angle:  angle,
      cornerStyle: 'circle',
      cornerColor: '#7c5cbf',
      cornerSize: 9,
      transparentCorners: false,
      // Thick cream/off-white border — torn print feel
      stroke: '#ede5d5',
      strokeWidth: border,
      strokeLineJoin: 'round',
      // Strong drop shadow — paper lying on a surface
      shadow: new fabric.Shadow({
        color:   'rgba(40,30,20,0.35)',
        blur:    sBlur,
        offsetX: sOff,
        offsetY: sOff + 2,
      }),
      // Slight opacity variation — aged, layered paper
      opacity: 0.88 + Math.random() * 0.12,
    });

    fc.add(img);
    fc.setActiveObject(img);
    fc.renderAll();
  }, opts);
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [sessionActive, setSessionActive] = useState(false);
  const [status,        setStatus]        = useState('click start to meet Mix');
  const [orbState,      setOrbState]      = useState('idle');
  const [selectedColor, setSelectedColor] = useState(null);
  const [selectedShape, setSelectedShape] = useState(null);
  const [images,        setImages]        = useState([]);
  const [transcript,    setTranscript]    = useState('');
  const [isGenerating,  setIsGenerating]  = useState(false);
  const [closing,       setClosing]       = useState(false);

  // flowStep: 'idle' | 'color_picked' | 'generating'
  const [flowStep, setFlowStep] = useState('idle');
  const [hasVideo, setHasVideo] = useState(false);   // tracks camera grant → triggers re-render

  const wsRef            = useRef(null);
  const fabricRef        = useRef(null);
  const mediaStreamRef   = useRef(null);
  const processorRef     = useRef(null);
  const canvasIntervalRef = useRef(null);

  // Video + beacon refs
  const videoRef         = useRef(null);   // hidden video for motion centroid
  const pipVideoRef      = useRef(null);   // visible PiP
  const motionCanRef     = useRef(null);   // hidden canvas for pixel diff
  const beaconElRef      = useRef(null);   // the beacon DOM element (direct style updates)
  const beaconSmoothed   = useRef({ x: 0.5, y: 0.5 }); // smoothed 0-1 position
  const beaconTrackRef   = useRef(null);   // interval ID for beacon tracking
  const hasVideoRef      = useRef(false);  // used inside callbacks

  // Wire up orb state setter for audio module
  _orbStateSetter = setOrbState;

  // ── Beacon tracking — follows motion centroid in webcam frame ──────────

  function updateBeaconPos(targetX, targetY) {
    const s = beaconSmoothed.current;
    s.x += (targetX - s.x) * 0.10;  // gentle lerp — floats, not jumps
    s.y += (targetY - s.y) * 0.10;
    const el = beaconElRef.current;
    if (el) {
      el.style.left = (s.x * 100) + '%';
      el.style.top  = (s.y * 100) + '%';
    }
  }

  function stopBeaconTracking() {
    if (beaconTrackRef.current) {
      clearInterval(beaconTrackRef.current);
      beaconTrackRef.current = null;
    }
  }

  function startBeaconTracking() {
    stopBeaconTracking();
    const video  = videoRef.current;
    const canvas = motionCanRef.current;
    if (!video || !canvas) return;

    const ctx = canvas.getContext('2d');
    canvas.width  = 80;
    canvas.height = 60;
    let prevData = null;

    function detect() {
      try {
        ctx.drawImage(video, 0, 0, 80, 60);
        const curr = ctx.getImageData(0, 0, 80, 60).data;
        if (prevData) {
          let wx = 0, wy = 0, total = 0;
          for (let y = 0; y < 60; y++) {
            for (let x = 0; x < 80; x++) {
              const i = (y * 80 + x) * 4;
              const diff = Math.abs(curr[i]   - prevData[i])
                         + Math.abs(curr[i+1] - prevData[i+1])
                         + Math.abs(curr[i+2] - prevData[i+2]);
              if (diff > 22) {
                wx += x * diff;
                wy += y * diff;
                total += diff;
              }
            }
          }
          if (total > 0) {
            // Mirror x so beacon follows correctly (webcam is front-facing, mirrored in PiP)
            const rawX = 1 - (wx / total) / 80;
            const rawY = (wy / total) / 60;
            updateBeaconPos(rawX, rawY);
          } else {
            // No motion — drift gently back toward center
            updateBeaconPos(0.5, 0.5);
          }
        }
        prevData = new Uint8ClampedArray(curr);
      } catch (_) { /* video not ready yet — skip frame */ }
    }

    beaconTrackRef.current = setInterval(detect, 200); // 5 fps
  }

  // ── Canvas action handlers ─────────────────────────────────────────────
  const handleColor = useCallback((c) => {
    // Re-picking a color resets the ritual
    stopMotionDetection();
    setSelectedColor(c.name);
    setSelectedShape(null);
    setFlowStep('color_picked');
    if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
      wsRef.current.send(JSON.stringify({
        type: 'canvas_action', action_type: 'color', value: c.name, hex: c.hex,
      }));
    }
  }, []);

  const handleShape = useCallback((s) => {
    setSelectedShape(s.name);
    setFlowStep('generating');
    if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
      wsRef.current.send(JSON.stringify({
        type: 'canvas_action', action_type: 'shape', value: s.name,
      }));
    }
    // Shape pick triggers image generation on the backend — no gesture needed
  }, []);

  const handleImageClick = useCallback((src) => {
    addToFabric(fabricRef.current, src);
  }, []);

  // ── Start session ──────────────────────────────────────────────────────
  const startSession = useCallback(async () => {
    setStatus('requesting mic & camera\u2026');

    // Try audio + video; fall back to audio-only if camera is denied
    try {
      _audioCtx = new AudioContext();
      mediaStreamRef.current = await navigator.mediaDevices.getUserMedia({
        audio: true,
        video: { width: 320, height: 240, facingMode: 'user' },
      });
      hasVideoRef.current = true;
      setHasVideo(true);
    } catch {
      try {
        mediaStreamRef.current = await navigator.mediaDevices.getUserMedia({
          audio: true, video: false,
        });
        hasVideoRef.current = false;
        setHasVideo(false);
      } catch {
        setStatus('mic access denied');
        return;
      }
    }

    // Point both video elements at the media stream + start beacon tracking
    if (hasVideoRef.current && videoRef.current) {
      videoRef.current.srcObject = mediaStreamRef.current;
      videoRef.current.play().catch(() => {});
    }
    if (hasVideoRef.current && pipVideoRef.current) {
      pipVideoRef.current.srcObject = mediaStreamRef.current;
      pipVideoRef.current.play().catch(() => {});
    }
    // Small delay so the video element is ready before we start reading frames
    if (hasVideoRef.current) {
      setTimeout(startBeaconTracking, 1200);
    }

    setStatus('connecting to Mix\u2026');
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(proto + '://' + location.host + '/ws');
    ws.binaryType = 'arraybuffer';
    wsRef.current = ws;

    ws.onopen = () => {
      setSessionActive(true);
      setStatus('Mix is waking up\u2026');
      setOrbState('listening');
      setTranscript('');
      setFlowStep('idle');

      // Ambient audio
      const amb = document.getElementById('ambient');
      amb.volume = 0.08;
      amb.play().catch(() => {});

      // Mic capture
      const source = _audioCtx.createMediaStreamSource(mediaStreamRef.current);
      const proc   = _audioCtx.createScriptProcessor(4096, 1, 1);
      proc.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const input = e.inputBuffer.getChannelData(0);
        const ratio  = _audioCtx.sampleRate / 16000;
        const outLen = Math.round(input.length / ratio);
        const res    = new Float32Array(outLen);
        for (let i = 0; i < outLen; i++) res[i] = input[Math.round(i * ratio)];
        ws.send(float32ToInt16(res).buffer);
      };
      source.connect(proc);
      proc.connect(_audioCtx.destination);
      processorRef.current = proc;

      // Canvas stream — Mix sees the collage every 2 seconds
      canvasIntervalRef.current = setInterval(() => {
        if (!ws || ws.readyState !== WebSocket.OPEN || !fabricRef.current) return;
        const b64 = fabricRef.current.toDataURL('image/jpeg', 0.5).split(',')[1];
        ws.send(JSON.stringify({ type: 'image', data: b64, mimeType: 'image/jpeg', source: 'canvas' }));
      }, 2000);
    };

    ws.onmessage = (event) => {
      if (event.data instanceof ArrayBuffer) {
        enqueueAudio(event.data);
        return;
      }
      try {
        const msg = JSON.parse(event.data);

        if (msg.transcript) {
          setTranscript(msg.transcript);
        }

        if (msg.type === 'generated_image') {
          setIsGenerating(false);
          // Ritual complete — reset so user can start again or just reflect
          setFlowStep('idle');
          setSelectedColor(null);
          setSelectedShape(null);
          const src = msg.url || 'data:image/jpeg;base64,' + msg.data;
          setImages(prev => [{ id: Date.now() + Math.random(), src }, ...prev]);
          addToFabric(fabricRef.current, src);
          setStatus('image added');
          setTimeout(() => setStatus(''), 2500);
        }

        if (msg.type === 'generating_canvas_image') {
          setIsGenerating(true);
          setStatus('creating your image\u2026');
        }

        if (msg.error) {
          setStatus('error: ' + msg.error);
        }
      } catch (_) {}
    };

    ws.onclose = () => {
      setSessionActive(false);
      setStatus('session ended');
      setOrbState('idle');
      setFlowStep('idle');
    };
    ws.onerror = () => {
      setStatus('connection error \u2014 is the server running?');
    };
  }, []);

  // ── End session ────────────────────────────────────────────────────────
  const endSession = useCallback(() => {
    stopBeaconTracking();
    if (processorRef.current)    { processorRef.current.disconnect(); processorRef.current = null; }
    if (mediaStreamRef.current)  { mediaStreamRef.current.getTracks().forEach(t => t.stop()); mediaStreamRef.current = null; }
    if (canvasIntervalRef.current) { clearInterval(canvasIntervalRef.current); canvasIntervalRef.current = null; }
    if (wsRef.current)           { wsRef.current.close(); wsRef.current = null; }
    if (_audioCtx)               { _audioCtx.close(); _audioCtx = null; }
    if (videoRef.current)        { videoRef.current.srcObject = null; }
    if (pipVideoRef.current)     { pipVideoRef.current.srcObject = null; }
    const amb = document.getElementById('ambient');
    amb.pause(); amb.currentTime = 0;
    _playbackQueue = []; _isPlaying = false;
    hasVideoRef.current = false;
    setHasVideo(false);
    setSessionActive(false); setOrbState('idle');
    setStatus('session ended \u2014 click start to begin again');
    setTranscript(''); setSelectedColor(null); setSelectedShape(null);
    setFlowStep('idle'); setClosing(false);
  }, []);

  const initiateClose = useCallback(() => {
    if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
      wsRef.current.send(JSON.stringify({ type: 'session_close' }));
    }
    setClosing(true);
  }, []);

  const saveAndEnd = useCallback(() => {
    const fc = fabricRef.current;
    if (fc) {
      const a = document.createElement('a');
      a.href = fc.toDataURL({ format: 'png', quality: 1 });
      a.download = 'mixbox-' + Date.now() + '.png';
      a.click();
    }
    setTimeout(endSession, 500);
  }, [endSession]);

  return html`
    <div className="app-grid">
      <${Header} status=${status} orbState=${orbState} />
      <${Sidebar}
        selectedColor=${selectedColor}
        selectedShape=${selectedShape}
        onColor=${handleColor}
        onShape=${handleShape}
        images=${images}
        isGenerating=${isGenerating}
        sessionActive=${sessionActive}
        flowStep=${flowStep}
        onImageClick=${handleImageClick}
      />
      <${CanvasArea}
        fabricRef=${fabricRef}
        isGenerating=${isGenerating}
        pipVideoRef=${pipVideoRef}
        hasVideo=${hasVideo}
        beaconElRef=${beaconElRef}
      />
      <${OrbPanel} orbState=${orbState} transcript=${transcript} />
      <${Footer} sessionActive=${sessionActive} status=${status} onStart=${startSession} onStop=${initiateClose} />
    </div>
    ${closing && html`
      <${CloseOverlay}
        message=${CLOSE_MSGS[Math.floor(Math.random() * CLOSE_MSGS.length)]}
        onSave=${saveAndEnd}
        onEnd=${endSession}
      />
    `}
    <video ref=${videoRef} style=${{ display: 'none' }} muted playsinline />
    <canvas ref=${motionCanRef} style=${{ display: 'none' }} />
  `;
}

// ── Mount ──────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
